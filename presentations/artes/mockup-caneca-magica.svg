<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <defs>
    <linearGradient id="mmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="blackMug" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="15%" stop-color="#222222"/>
      <stop offset="50%" stop-color="#1e1e1e"/>
      <stop offset="85%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="blackInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="blackHandle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <filter id="mmGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mmSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mmShadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="blackMugClip">
      <path d="M100,80 L100,340 Q100,370 130,370 L310,370 Q340,370 340,340 L340,80 Z"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      .mm-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .mm-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <g filter="url(#mmShadow)">
    <!-- Black mug body -->
    <path d="M100,80 L100,340 Q100,370 130,370 L310,370 Q340,370 340,340 L340,80 Z"
          fill="url(#blackMug)" stroke="#333" stroke-width="1"/>
    <!-- Rim -->
    <ellipse cx="220" cy="80" rx="120" ry="18" fill="url(#blackInner)" stroke="#333" stroke-width="1"/>
    <ellipse cx="220" cy="80" rx="110" ry="14" fill="#0a0a0a"/>
    <!-- Handle -->
    <path d="M340,140 Q400,140 400,225 Q400,310 340,310"
          fill="none" stroke="url(#blackHandle)" stroke-width="18" stroke-linecap="round"/>
    <path d="M340,140 Q400,140 400,225 Q400,310 340,310"
          fill="none" stroke="#333" stroke-width="1"/>
    <path d="M340,158 Q382,158 382,225 Q382,292 340,292"
          fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- ==================== NEON DESIGN ON BLACK MUG ==================== -->
  <g clip-path="url(#blackMugClip)">
    <!-- Neon stripe top -->
    <rect x="100" y="95" width="240" height="2" fill="url(#mmGrad)" opacity="0.8"/>

    <!-- VR Headset with neon glow -->
    <g transform="translate(165, 190)">
      <g filter="url(#mmGlow)">
        <path d="M-30,0 C-30,-15 -24,-21 0,-21 C24,-21 30,-15 30,0 C30,10 24,16 0,16 C-24,16 -30,10 -30,0 Z"
              fill="none" stroke="url(#mmGrad)" stroke-width="1.5"/>
      </g>
      <ellipse cx="-10" cy="-1" rx="10" ry="8" fill="none" stroke="#00b8d4" stroke-width="1.2"/>
      <ellipse cx="10" cy="-1" rx="10" ry="8" fill="none" stroke="#7c4dff" stroke-width="1.2"/>
      <ellipse cx="-10" cy="-1" rx="6" ry="5" fill="#00b8d4" opacity="0.08"/>
      <ellipse cx="10" cy="-1" rx="6" ry="5" fill="#7c4dff" opacity="0.08"/>
      <path d="M-30,-3 Q-38,-3 -39,2 Q-38,7 -30,7" fill="none" stroke="#00b8d4" stroke-width="1" opacity="0.4"/>
      <path d="M30,-3 Q38,-3 39,2 Q38,7 30,7" fill="none" stroke="#7c4dff" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Brand name neon -->
    <g filter="url(#mmGlow)">
      <text x="270" y="180" text-anchor="middle" class="mm-title" font-size="26" fill="url(#mmGrad)" letter-spacing="3">VR</text>
    </g>
    <text x="270" y="180" text-anchor="middle" class="mm-title" font-size="26" fill="url(#mmGrad)" letter-spacing="3">VR</text>

    <g filter="url(#mmSoft)">
      <text x="270" y="205" text-anchor="middle" class="mm-sub" font-size="12" fill="#ffffff" letter-spacing="5" opacity="0.9">EXPERIENCE</text>
    </g>
    <text x="270" y="205" text-anchor="middle" class="mm-sub" font-size="12" fill="#ffffff" letter-spacing="5" opacity="0.9">EXPERIENCE</text>

    <!-- Neon underline -->
    <g filter="url(#mmSoft)">
      <line x1="218" y1="215" x2="322" y2="215" stroke="url(#mmGrad)" stroke-width="1.2" opacity="0.6"/>
    </g>

    <!-- Gamer Edition -->
    <text x="270" y="232" text-anchor="middle" class="mm-sub" font-size="6" fill="#00e676" letter-spacing="3" opacity="0.6">GAMER EDITION</text>

    <!-- Game controller mini icon -->
    <g transform="translate(160, 255)" opacity="0.4">
      <path d="M-18,-6 C-18,-12 -12,-14 -6,-14 L6,-14 C12,-14 18,-12 18,-6 L18,2 C18,6 14,10 8,14 L4,16 C2,17 -2,17 -4,16 L-8,14 C-14,10 -18,6 -18,2 Z"
            fill="none" stroke="#00e676" stroke-width="1"/>
      <rect x="-10" y="-4" width="3" height="7" rx="0.5" fill="#00e676" opacity="0.5"/>
      <rect x="-12" y="-1" width="7" height="3" rx="0.5" fill="#00e676" opacity="0.5"/>
      <circle cx="8" cy="-4" r="2" fill="none" stroke="#00b8d4" stroke-width="0.8"/>
      <circle cx="12" cy="0" r="2" fill="none" stroke="#ff4081" stroke-width="0.8"/>
    </g>

    <!-- HP bar mini -->
    <g transform="translate(195, 260)" opacity="0.35">
      <rect x="0" y="0" width="40" height="5" rx="1" fill="none" stroke="#ffffff" stroke-width="0.5"/>
      <rect x="0.5" y="0.5" width="28" height="4" rx="0.5" fill="#00e676"/>
    </g>

    <!-- Floating neon particles -->
    <g opacity="0.3">
      <circle cx="130" cy="140" r="1.5" fill="#00b8d4" filter="url(#mmSoft)"/>
      <circle cx="320" cy="150" r="1.2" fill="#7c4dff" filter="url(#mmSoft)"/>
      <circle cx="140" cy="300" r="1" fill="#00e676" filter="url(#mmSoft)"/>
      <circle cx="310" cy="290" r="1.3" fill="#ff4081" filter="url(#mmSoft)"/>
    </g>

    <!-- Neon stripe bottom -->
    <rect x="100" y="352" width="240" height="2" fill="url(#mmGrad)" opacity="0.8"/>
  </g>

  <!-- Subtle reflection on black ceramic -->
  <g clip-path="url(#blackMugClip)" opacity="0.05">
    <rect x="100" y="80" width="70" height="290" fill="#ffffff"/>
  </g>
</svg>