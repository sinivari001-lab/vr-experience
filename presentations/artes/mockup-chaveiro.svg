<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="kcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="kcAcrylic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="kcGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="kcSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="kcShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="kcClip">
      <rect x="75" y="145" width="150" height="210" rx="16"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      .kc-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .kc-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Keyring -->
  <g transform="translate(150, 80)">
    <!-- Metal ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#888888" stroke-width="5"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#aaaaaa" stroke-width="3"/>
    <!-- Ring highlight -->
    <path d="M-20,-20 A28,28 0 0,1 20,-20" fill="none" stroke="#cccccc" stroke-width="1.5" opacity="0.5"/>
    <!-- Ring connection -->
    <circle cx="0" cy="26" r="4" fill="#999" stroke="#777" stroke-width="1"/>
  </g>

  <!-- Chain link -->
  <g transform="translate(150, 118)">
    <rect x="-4" y="0" width="8" height="18" rx="3" fill="none" stroke="#999" stroke-width="2.5"/>
    <rect x="-4" y="0" width="8" height="18" rx="3" fill="none" stroke="#bbb" stroke-width="1.5"/>
  </g>

  <!-- Small connector -->
  <g transform="translate(150, 138)">
    <circle cx="0" cy="0" r="5" fill="#888" stroke="#666" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#999"/>
  </g>

  <!-- Acrylic body -->
  <g filter="url(#kcShadow)">
    <!-- Main acrylic rectangle -->
    <rect x="75" y="145" width="150" height="210" rx="16" fill="url(#kcAcrylic)" stroke="url(#kcGrad)" stroke-width="2"/>

    <!-- Inner border glow -->
    <rect x="80" y="150" width="140" height="200" rx="13" fill="none" stroke="url(#kcGrad)" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- ==================== DESIGN ON KEYCHAIN ==================== -->
  <g clip-path="url(#kcClip)">
    <!-- Ambient glow -->
    <ellipse cx="150" cy="240" rx="50" ry="40" fill="url(#kcGrad)" opacity="0.06"/>

    <!-- VR Headset mini -->
    <g transform="translate(150, 225)">
      <g filter="url(#kcGlow)">
        <path d="M-35,0 C-35,-18 -28,-24 0,-24 C28,-24 35,-18 35,0 C35,11 28,19 0,19 C-28,19 -35,11 -35,0 Z"
              fill="none" stroke="url(#kcGrad)" stroke-width="1.5"/>
      </g>
      <path d="M-35,0 C-35,-18 -28,-24 0,-24 C28,-24 35,-18 35,0 C35,11 28,19 0,19 C-28,19 -35,11 -35,0 Z"
            fill="#0d0d2b" stroke="url(#kcGrad)" stroke-width="1.2"/>
      <!-- Left lens -->
      <g filter="url(#kcSoft)">
        <ellipse cx="-12" cy="-1" rx="12" ry="10" fill="none" stroke="#00b8d4" stroke-width="1.5"/>
      </g>
      <ellipse cx="-12" cy="-1" rx="8" ry="6" fill="#00b8d4" opacity="0.06"/>
      <!-- Right lens -->
      <g filter="url(#kcSoft)">
        <ellipse cx="12" cy="-1" rx="12" ry="10" fill="none" stroke="#7c4dff" stroke-width="1.5"/>
      </g>
      <ellipse cx="12" cy="-1" rx="8" ry="6" fill="#7c4dff" opacity="0.06"/>
      <!-- Straps -->
      <path d="M-35,-3 Q-43,-3 -44,2 Q-43,7 -35,7" fill="none" stroke="#00b8d4" stroke-width="1" opacity="0.4"/>
      <path d="M35,-3 Q43,-3 44,2 Q43,7 35,7" fill="none" stroke="#7c4dff" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- VR text -->
    <g filter="url(#kcGlow)">
      <text x="150" y="278" text-anchor="middle" class="kc-title" font-size="22" fill="url(#kcGrad)" letter-spacing="2">VR</text>
    </g>
    <text x="150" y="278" text-anchor="middle" class="kc-title" font-size="22" fill="url(#kcGrad)" letter-spacing="2">VR</text>

    <!-- EXPERIENCE -->
    <text x="150" y="296" text-anchor="middle" class="kc-sub" font-size="9" fill="#ffffff" letter-spacing="4" opacity="0.9">EXPERIENCE</text>

    <!-- Underline -->
    <line x1="110" y1="305" x2="190" y2="305" stroke="url(#kcGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="150" y="320" text-anchor="middle" class="kc-sub" font-size="5" fill="#00b8d4" letter-spacing="2" opacity="0.5">SALVADOR - BA</text>

    <!-- Accent dots -->
    <circle cx="138" cy="335" r="1.5" fill="#00b8d4" opacity="0.3"/>
    <circle cx="150" cy="335" r="1.5" fill="#7c4dff" opacity="0.3"/>
    <circle cx="162" cy="335" r="1.5" fill="#00e676" opacity="0.3"/>

    <!-- Floating particles -->
    <circle cx="95" cy="180" r="1.2" fill="#00b8d4" opacity="0.3" filter="url(#kcSoft)"/>
    <circle cx="205" cy="190" r="1" fill="#7c4dff" opacity="0.3" filter="url(#kcSoft)"/>
    <circle cx="100" cy="320" r="0.8" fill="#00e676" opacity="0.2"/>
    <circle cx="200" cy="310" r="1" fill="#ff4081" opacity="0.2"/>
  </g>

  <!-- Acrylic reflection -->
  <g clip-path="url(#kcClip)" opacity="0.06">
    <rect x="75" y="145" width="50" height="210" fill="#ffffff"/>
  </g>
  <!-- Edge highlight -->
  <g clip-path="url(#kcClip)" opacity="0.1">
    <path d="M75,150 Q80,250 75,355" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>
</svg>