<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <defs>
    <linearGradient id="mgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="40%" stop-color="#00b8d4"/>
      <stop offset="70%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>
    <linearGradient id="mgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="matteMug" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="15%" stop-color="#1f1f1f"/>
      <stop offset="50%" stop-color="#1c1c1c"/>
      <stop offset="85%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <filter id="mgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mgSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mgShadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="gamerMugClip">
      <path d="M100,80 L100,340 Q100,370 130,370 L310,370 Q340,370 340,340 L340,80 Z"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      .mg-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .mg-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <g filter="url(#mgShadow)">
    <!-- Matte black mug with lid -->
    <path d="M100,80 L100,340 Q100,370 130,370 L310,370 Q340,370 340,340 L340,80 Z"
          fill="url(#matteMug)" stroke="#2a2a2a" stroke-width="1"/>
    <!-- Lid -->
    <ellipse cx="220" cy="80" rx="120" ry="18" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <ellipse cx="220" cy="80" rx="105" ry="12" fill="#111111"/>
    <!-- Lid knob -->
    <ellipse cx="220" cy="72" rx="12" ry="5" fill="#222222" stroke="#333" stroke-width="0.5"/>
    <!-- Handle -->
    <path d="M340,140 Q405,140 405,225 Q405,310 340,310"
          fill="none" stroke="#1e1e1e" stroke-width="20" stroke-linecap="round"/>
    <path d="M340,140 Q405,140 405,225 Q405,310 340,310"
          fill="none" stroke="#2a2a2a" stroke-width="1"/>
  </g>

  <!-- ==================== FULL GAMER DESIGN ==================== -->
  <g clip-path="url(#gamerMugClip)">
    <!-- Rainbow neon top stripe -->
    <rect x="100" y="95" width="240" height="2.5" fill="url(#mgGrad)" opacity="0.9"/>

    <!-- Background grid -->
    <g opacity="0.04">
      <line x1="100" y1="120" x2="340" y2="120" stroke="#00b8d4" stroke-width="0.5"/>
      <line x1="100" y1="160" x2="340" y2="160" stroke="#7c4dff" stroke-width="0.5"/>
      <line x1="100" y1="200" x2="340" y2="200" stroke="#00b8d4" stroke-width="0.5"/>
      <line x1="100" y1="240" x2="340" y2="240" stroke="#7c4dff" stroke-width="0.5"/>
      <line x1="100" y1="280" x2="340" y2="280" stroke="#00b8d4" stroke-width="0.5"/>
      <line x1="100" y1="320" x2="340" y2="320" stroke="#7c4dff" stroke-width="0.5"/>
    </g>

    <!-- Game controller (left) -->
    <g transform="translate(150, 180)">
      <g filter="url(#mgSoft)">
        <path d="M-25,-6 C-25,-13 -17,-15 -8,-15 L8,-15 C17,-15 25,-13 25,-6 L25,2 C25,6 21,10 14,15 L10,17 C8,18 5,18 3,16 L1,14 L-1,14 L-3,16 C-5,18 -8,18 -10,17 L-14,15 C-21,10 -25,6 -25,2 Z"
              fill="none" stroke="#00e676" stroke-width="1.2"/>
      </g>
      <rect x="-15" y="-4" width="3" height="8" rx="0.5" fill="#00e676" opacity="0.5"/>
      <rect x="-18" y="-1" width="9" height="3" rx="0.5" fill="#00e676" opacity="0.5"/>
      <circle cx="12" cy="-5" r="2.5" fill="none" stroke="#00b8d4" stroke-width="0.8"/>
      <circle cx="17" cy="0" r="2.5" fill="none" stroke="#ff4081" stroke-width="0.8"/>
      <circle cx="7" cy="0" r="2.5" fill="none" stroke="#7c4dff" stroke-width="0.8"/>
      <circle cx="12" cy="5" r="2.5" fill="none" stroke="#00e676" stroke-width="0.8"/>
    </g>

    <!-- Central VR headset -->
    <g transform="translate(220, 210)">
      <g filter="url(#mgGlow)">
        <path d="M-35,0 C-35,-18 -28,-24 0,-24 C28,-24 35,-18 35,0 C35,11 28,19 0,19 C-28,19 -35,11 -35,0 Z"
              fill="none" stroke="url(#mgGrad2)" stroke-width="1.8"/>
      </g>
      <path d="M-35,0 C-35,-18 -28,-24 0,-24 C28,-24 35,-18 35,0 C35,11 28,19 0,19 C-28,19 -35,11 -35,0 Z"
            fill="#111" stroke="url(#mgGrad2)" stroke-width="1.2"/>
      <ellipse cx="-12" cy="-1" rx="11" ry="9" fill="none" stroke="#00b8d4" stroke-width="1.5"/>
      <ellipse cx="12" cy="-1" rx="11" ry="9" fill="none" stroke="#7c4dff" stroke-width="1.5"/>
      <ellipse cx="-12" cy="-1" rx="7" ry="5" fill="#00b8d4" opacity="0.06"/>
      <ellipse cx="12" cy="-1" rx="7" ry="5" fill="#7c4dff" opacity="0.06"/>
    </g>

    <!-- VR EXPERIENCE text -->
    <g filter="url(#mgGlow)">
      <text x="220" y="260" text-anchor="middle" class="mg-title" font-size="22" fill="#ffffff" letter-spacing="2">VR</text>
    </g>
    <text x="220" y="260" text-anchor="middle" class="mg-title" font-size="22" fill="#ffffff" letter-spacing="2">VR</text>
    <text x="220" y="278" text-anchor="middle" class="mg-sub" font-size="10" fill="url(#mgGrad)" letter-spacing="4">EXPERIENCE</text>

    <!-- Neon underline -->
    <g filter="url(#mgSoft)">
      <line x1="168" y1="286" x2="272" y2="286" stroke="url(#mgGrad)" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- GAMER EDITION -->
    <text x="220" y="300" text-anchor="middle" class="mg-sub" font-size="5.5" fill="#00e676" letter-spacing="3" opacity="0.5">GAMER EDITION</text>

    <!-- Pixel sword (right) -->
    <g transform="translate(300, 170) rotate(30)" opacity="0.35">
      <rect x="0" y="0" width="3" height="22" fill="#00b8d4"/>
      <rect x="-3" y="18" width="9" height="3" fill="#7c4dff"/>
      <rect x="-1" y="21" width="5" height="7" fill="#00e676"/>
    </g>

    <!-- Shield (right) -->
    <g transform="translate(310, 230)" opacity="0.25">
      <path d="M0,-12 L10,-6 L10,5 L0,12 L-10,5 L-10,-6 Z" fill="none" stroke="#7c4dff" stroke-width="1.2"/>
      <path d="M0,-7 L0,7" stroke="#00b8d4" stroke-width="0.8"/>
      <path d="M-5,0 L5,0" stroke="#00b8d4" stroke-width="0.8"/>
    </g>

    <!-- HP bar -->
    <g transform="translate(260, 310)" opacity="0.3">
      <rect x="0" y="0" width="45" height="5" rx="1" fill="none" stroke="#ffffff" stroke-width="0.5"/>
      <rect x="0.5" y="0.5" width="32" height="4" rx="0.5" fill="#00e676"/>
    </g>

    <!-- Stars -->
    <g filter="url(#mgSoft)" opacity="0.25">
      <polygon points="140,130 142,135 147,135 143,138 144,143 140,140 136,143 137,138 133,135 138,135" fill="#FFD700"/>
      <polygon points="305,140 306,143 310,143 307,145 308,149 305,147 302,149 303,145 300,143 304,143" fill="#FFD700"/>
    </g>

    <!-- Neon particles -->
    <g opacity="0.25">
      <circle cx="125" cy="160" r="1.2" fill="#00e676" filter="url(#mgSoft)"/>
      <circle cx="325" cy="170" r="1" fill="#ff4081" filter="url(#mgSoft)"/>
      <circle cx="130" cy="310" r="1" fill="#00b8d4"/>
      <circle cx="320" cy="300" r="0.8" fill="#7c4dff"/>
    </g>

    <!-- Rainbow neon bottom stripe -->
    <rect x="100" y="352" width="240" height="2.5" fill="url(#mgGrad)" opacity="0.9"/>
  </g>

  <!-- Matte reflection -->
  <g clip-path="url(#gamerMugClip)" opacity="0.04">
    <rect x="100" y="80" width="65" height="290" fill="#ffffff"/>
  </g>
</svg>