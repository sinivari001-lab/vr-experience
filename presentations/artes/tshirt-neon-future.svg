<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b8d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00b8d4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
    <!-- Google Fonts Orbitron import via style -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      .title-text { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .sub-text { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#0a0a1a" rx="8"/>

  <!-- Ambient glow behind headset -->
  <ellipse cx="200" cy="200" rx="140" ry="90" fill="url(#neonGrad)" opacity="0.08"/>

  <!-- VR Headset Body - Main Shape -->
  <g transform="translate(200, 195)">
    <!-- Outer glow layer -->
    <g filter="url(#outerGlow)" opacity="0.4">
      <path d="M-105,0 C-105,-55 -85,-75 0,-75 C85,-75 105,-55 105,0 C105,35 85,60 0,60 C-85,60 -105,35 -105,0 Z"
            fill="none" stroke="url(#neonGrad)" stroke-width="2"/>
    </g>

    <!-- Headset main body -->
    <path d="M-105,0 C-105,-55 -85,-75 0,-75 C85,-75 105,-55 105,0 C105,35 85,60 0,60 C-85,60 -105,35 -105,0 Z"
          fill="#0d0d2b" stroke="url(#neonGrad)" stroke-width="2.5" opacity="0.95"/>

    <!-- Headset front face panel -->
    <path d="M-90,-5 C-90,-45 -72,-60 0,-60 C72,-60 90,-45 90,-5 C90,25 72,45 0,45 C-72,45 -90,25 -90,-5 Z"
          fill="#0a0a1a" stroke="url(#neonGrad)" stroke-width="1" opacity="0.6"/>

    <!-- Left lens -->
    <g filter="url(#neonGlow)">
      <ellipse cx="-38" cy="-5" rx="32" ry="28" fill="none" stroke="#00b8d4" stroke-width="2.5"/>
    </g>
    <ellipse cx="-38" cy="-5" rx="26" ry="22" fill="#00b8d4" opacity="0.06"/>
    <ellipse cx="-38" cy="-5" rx="18" ry="15" fill="#00b8d4" opacity="0.04"/>
    <!-- Lens highlight -->
    <ellipse cx="-44" cy="-12" rx="8" ry="5" fill="#00b8d4" opacity="0.15" transform="rotate(-15,-44,-12)"/>

    <!-- Right lens -->
    <g filter="url(#neonGlow)">
      <ellipse cx="38" cy="-5" rx="32" ry="28" fill="none" stroke="#7c4dff" stroke-width="2.5"/>
    </g>
    <ellipse cx="38" cy="-5" rx="26" ry="22" fill="#7c4dff" opacity="0.06"/>
    <ellipse cx="38" cy="-5" rx="18" ry="15" fill="#7c4dff" opacity="0.04"/>
    <!-- Lens highlight -->
    <ellipse cx="32" cy="-12" rx="8" ry="5" fill="#7c4dff" opacity="0.15" transform="rotate(15,32,-12)"/>

    <!-- Nose bridge -->
    <path d="M-6,20 Q0,30 6,20" fill="none" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Head strap - left -->
    <g filter="url(#softGlow)">
      <path d="M-105,-10 Q-130,-10 -135,5 Q-130,20 -105,20"
            fill="none" stroke="#00b8d4" stroke-width="2" opacity="0.7"/>
    </g>
    <!-- Head strap - right -->
    <g filter="url(#softGlow)">
      <path d="M105,-10 Q130,-10 135,5 Q130,20 105,20"
            fill="none" stroke="#7c4dff" stroke-width="2" opacity="0.7"/>
    </g>

    <!-- Top strap -->
    <g filter="url(#softGlow)">
      <path d="M-40,-75 Q0,-100 40,-75"
            fill="none" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Decorative neon lines on headset body -->
    <line x1="-85" y1="-35" x2="-60" y2="-35" stroke="#00b8d4" stroke-width="1" opacity="0.6" filter="url(#softGlow)"/>
    <line x1="-85" y1="-28" x2="-70" y2="-28" stroke="#00b8d4" stroke-width="0.8" opacity="0.4"/>
    <line x1="85" y1="-35" x2="60" y2="-35" stroke="#7c4dff" stroke-width="1" opacity="0.6" filter="url(#softGlow)"/>
    <line x1="85" y1="-28" x2="70" y2="-28" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>

    <!-- Bottom accent line -->
    <path d="M-60,45 Q0,55 60,45" fill="none" stroke="url(#neonGrad)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Flowing neon lines below headset -->
  <g filter="url(#softGlow)" opacity="0.6">
    <path d="M80,270 Q140,285 200,275 Q260,265 320,280" fill="none" stroke="#00b8d4" stroke-width="1.5"/>
    <path d="M60,285 Q130,300 200,290 Q270,280 340,295" fill="none" stroke="#7c4dff" stroke-width="1"/>
    <path d="M90,300 Q150,310 200,305 Q250,300 310,310" fill="none" stroke="#00b8d4" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.5">
    <circle cx="60" cy="130" r="2" fill="#00b8d4" filter="url(#softGlow)"/>
    <circle cx="340" cy="150" r="1.5" fill="#7c4dff" filter="url(#softGlow)"/>
    <circle cx="80" cy="260" r="1.8" fill="#00b8d4" filter="url(#softGlow)"/>
    <circle cx="320" cy="240" r="2.2" fill="#7c4dff" filter="url(#softGlow)"/>
    <circle cx="150" cy="100" r="1.2" fill="#00e676" filter="url(#softGlow)"/>
    <circle cx="250" cy="110" r="1" fill="#00e676" filter="url(#softGlow)"/>
    <circle cx="100" cy="310" r="1.5" fill="#00b8d4"/>
    <circle cx="300" cy="320" r="1.2" fill="#7c4dff"/>
  </g>

  <!-- Title: VR EXPERIENCE -->
  <g filter="url(#neonGlow)">
    <text x="200" y="370" text-anchor="middle" class="title-text" font-size="36" fill="url(#neonGrad)" letter-spacing="4">VR</text>
  </g>
  <text x="200" y="370" text-anchor="middle" class="title-text" font-size="36" fill="url(#neonGrad)" letter-spacing="4">VR</text>

  <g filter="url(#softGlow)">
    <text x="200" y="405" text-anchor="middle" class="sub-text" font-size="22" fill="#ffffff" letter-spacing="8" opacity="0.95">EXPERIENCE</text>
  </g>
  <text x="200" y="405" text-anchor="middle" class="sub-text" font-size="22" fill="#ffffff" letter-spacing="8" opacity="0.95">EXPERIENCE</text>

  <!-- Decorative line under text -->
  <g filter="url(#softGlow)">
    <line x1="100" y1="420" x2="300" y2="420" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Tagline -->
  <text x="200" y="445" text-anchor="middle" class="sub-text" font-size="9" fill="#00b8d4" letter-spacing="5" opacity="0.6">REALIDADE VIRTUAL</text>

  <!-- Small accent dots at bottom -->
  <circle cx="170" cy="470" r="2" fill="#00b8d4" opacity="0.4"/>
  <circle cx="200" cy="470" r="2" fill="#7c4dff" opacity="0.4"/>
  <circle cx="230" cy="470" r="2" fill="#00e676" opacity="0.4"/>
</svg>