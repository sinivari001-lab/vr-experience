<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .s-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .s-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
      .s-light { font-family: 'Orbitron', sans-serif; font-weight: 400; }
      .s-pixel { font-family: 'Press Start 2P', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#f5f5f5" rx="8"/>

  <!-- Cut line guides (dashed) -->
  <g stroke="#cccccc" stroke-width="0.5" stroke-dasharray="4,4" fill="none">
    <!-- Sticker 1 boundary -->
    <circle cx="140" cy="130" r="95"/>
    <!-- Sticker 2 boundary -->
    <circle cx="380" cy="130" r="95"/>
    <!-- Sticker 3 boundary -->
    <rect x="40" y="265" width="180" height="180" rx="12"/>
    <!-- Sticker 4 boundary -->
    <rect x="260" y="265" width="140" height="180" rx="12"/>
    <!-- Sticker 5 boundary -->
    <rect x="430" y="265" width="140" height="180" rx="12"/>
  </g>

  <!-- ==================== STICKER 1: VR Headset Icon ==================== -->
  <g transform="translate(140, 130)">
    <!-- Sticker background -->
    <circle cx="0" cy="0" r="90" fill="#0a0a1a"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="url(#sGrad)" stroke-width="2"/>

    <!-- VR Headset -->
    <g transform="translate(0, -8)">
      <g filter="url(#sGlow)">
        <path d="M-50,0 C-50,-25 -40,-35 0,-35 C40,-35 50,-25 50,0 C50,16 40,28 0,28 C-40,28 -50,16 -50,0 Z"
              fill="none" stroke="url(#sGrad)" stroke-width="2.5"/>
      </g>
      <path d="M-50,0 C-50,-25 -40,-35 0,-35 C40,-35 50,-25 50,0 C50,16 40,28 0,28 C-40,28 -50,16 -50,0 Z"
            fill="#0d0d2b" stroke="url(#sGrad)" stroke-width="2"/>

      <!-- Left lens -->
      <g filter="url(#sSoft)">
        <ellipse cx="-17" cy="-1" rx="16" ry="13" fill="none" stroke="#00b8d4" stroke-width="2"/>
      </g>
      <ellipse cx="-17" cy="-1" rx="11" ry="9" fill="#00b8d4" opacity="0.08"/>

      <!-- Right lens -->
      <g filter="url(#sSoft)">
        <ellipse cx="17" cy="-1" rx="16" ry="13" fill="none" stroke="#7c4dff" stroke-width="2"/>
      </g>
      <ellipse cx="17" cy="-1" rx="11" ry="9" fill="#7c4dff" opacity="0.08"/>

      <!-- Straps -->
      <path d="M-50,-4 Q-62,-4 -64,3 Q-62,10 -50,10" fill="none" stroke="#00b8d4" stroke-width="1.5" opacity="0.5"/>
      <path d="M50,-4 Q62,-4 64,3 Q62,10 50,10" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Label -->
    <text x="0" y="52" text-anchor="middle" class="s-light" font-size="8" fill="#00b8d4" letter-spacing="3">VR HEADSET</text>

    <!-- Corner particles -->
    <circle cx="-60" cy="-55" r="2" fill="#00b8d4" opacity="0.4"/>
    <circle cx="60" cy="-50" r="1.5" fill="#7c4dff" opacity="0.4"/>
    <circle cx="-55" cy="40" r="1.5" fill="#00e676" opacity="0.3"/>
    <circle cx="55" cy="45" r="2" fill="#ff4081" opacity="0.3"/>
  </g>

  <!-- ==================== STICKER 2: I Love VR ==================== -->
  <g transform="translate(380, 130)">
    <!-- Sticker background -->
    <circle cx="0" cy="0" r="90" fill="#0a0a1a"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="#ff4081" stroke-width="2"/>

    <!-- "I" -->
    <text x="-45" y="8" text-anchor="middle" class="s-title" font-size="40" fill="#ffffff">I</text>

    <!-- Heart -->
    <g transform="translate(0, -10)">
      <g filter="url(#sGlow)">
        <path d="M0,-12 C-4,-22 -18,-22 -18,-10 C-18,0 0,15 0,15 C0,15 18,0 18,-10 C18,-22 4,-22 0,-12 Z"
              fill="#ff4081"/>
      </g>
      <path d="M0,-12 C-4,-22 -18,-22 -18,-10 C-18,0 0,15 0,15 C0,15 18,0 18,-10 C18,-22 4,-22 0,-12 Z"
            fill="#ff4081"/>
      <!-- Heart highlight -->
      <ellipse cx="-8" cy="-10" rx="4" ry="3" fill="#ff80ab" opacity="0.5"/>
    </g>

    <!-- "VR" -->
    <text x="42" y="8" text-anchor="middle" class="s-title" font-size="40" fill="url(#sGrad)">VR</text>

    <!-- Subtitle -->
    <text x="0" y="52" text-anchor="middle" class="s-light" font-size="7" fill="#ffffff" letter-spacing="2" opacity="0.5">VIRTUAL REALITY LOVER</text>

    <!-- Small hearts scattered -->
    <g fill="#ff4081" opacity="0.3">
      <path d="M-60,-50 C-60,-53 -63,-53 -63,-51 C-63,-49 -60,-46 -60,-46 C-60,-46 -57,-49 -57,-51 C-57,-53 -60,-53 -60,-50 Z" transform="scale(0.8)"/>
      <path d="M70,-40 C70,-43 67,-43 67,-41 C67,-39 70,-36 70,-36 C70,-36 73,-39 73,-41 C73,-43 70,-43 70,-40 Z" transform="scale(0.7)"/>
    </g>
  </g>

  <!-- ==================== STICKER 3: Game Controller Pixel Art ==================== -->
  <g transform="translate(130, 355)">
    <!-- Sticker background -->
    <rect x="-85" y="-85" width="170" height="170" rx="10" fill="#0a0a1a"/>
    <rect x="-83" y="-83" width="166" height="166" rx="9" fill="none" stroke="#00e676" stroke-width="1.5"/>

    <!-- Pixel art game controller -->
    <g transform="translate(-40, -30)">
      <!-- Controller body pixels (6px blocks) -->
      <!-- Top row -->
      <rect x="12" y="0" width="6" height="6" fill="#00b8d4"/>
      <rect x="18" y="0" width="6" height="6" fill="#00b8d4"/>
      <rect x="24" y="0" width="6" height="6" fill="#00b8d4"/>
      <rect x="30" y="0" width="6" height="6" fill="#00b8d4"/>
      <rect x="36" y="0" width="6" height="6" fill="#7c4dff"/>
      <rect x="42" y="0" width="6" height="6" fill="#7c4dff"/>
      <rect x="48" y="0" width="6" height="6" fill="#7c4dff"/>
      <rect x="54" y="0" width="6" height="6" fill="#7c4dff"/>

      <!-- Row 2 -->
      <rect x="6" y="6" width="6" height="6" fill="#00b8d4"/>
      <rect x="12" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="18" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="24" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="30" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="36" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="42" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="48" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="54" y="6" width="6" height="6" fill="#0d1b2a"/>
      <rect x="60" y="6" width="6" height="6" fill="#7c4dff"/>

      <!-- Row 3 - D-pad and buttons -->
      <rect x="0" y="12" width="6" height="6" fill="#00b8d4"/>
      <rect x="6" y="12" width="6" height="6" fill="#0d1b2a"/>
      <!-- D-pad -->
      <rect x="12" y="12" width="6" height="6" fill="#00e676"/>
      <rect x="18" y="12" width="6" height="6" fill="#00e676"/>
      <rect x="24" y="12" width="6" height="6" fill="#00e676"/>
      <rect x="30" y="12" width="6" height="6" fill="#0d1b2a"/>
      <rect x="36" y="12" width="6" height="6" fill="#0d1b2a"/>
      <!-- Buttons -->
      <rect x="42" y="12" width="6" height="6" fill="#ff4081"/>
      <rect x="48" y="12" width="6" height="6" fill="#0d1b2a"/>
      <rect x="54" y="12" width="6" height="6" fill="#00b8d4"/>
      <rect x="60" y="12" width="6" height="6" fill="#0d1b2a"/>
      <rect x="66" y="12" width="6" height="6" fill="#7c4dff"/>

      <!-- Row 4 -->
      <rect x="0" y="18" width="6" height="6" fill="#00b8d4"/>
      <rect x="6" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="12" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="18" y="18" width="6" height="6" fill="#00e676"/>
      <rect x="24" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="30" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="36" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="42" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="48" y="18" width="6" height="6" fill="#FFD700"/>
      <rect x="54" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="60" y="18" width="6" height="6" fill="#0d1b2a"/>
      <rect x="66" y="18" width="6" height="6" fill="#7c4dff"/>

      <!-- Row 5 - handles -->
      <rect x="0" y="24" width="6" height="6" fill="#00b8d4"/>
      <rect x="6" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="12" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="18" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="24" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="30" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="36" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="42" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="48" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="54" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="60" y="24" width="6" height="6" fill="#0d1b2a"/>
      <rect x="66" y="24" width="6" height="6" fill="#7c4dff"/>

      <!-- Row 6 - handles split -->
      <rect x="0" y="30" width="6" height="6" fill="#00b8d4"/>
      <rect x="6" y="30" width="6" height="6" fill="#00b8d4"/>
      <rect x="12" y="30" width="6" height="6" fill="#0d1b2a"/>
      <rect x="18" y="30" width="6" height="6" fill="#00b8d4"/>
      <!-- gap -->
      <rect x="48" y="30" width="6" height="6" fill="#7c4dff"/>
      <rect x="54" y="30" width="6" height="6" fill="#0d1b2a"/>
      <rect x="60" y="30" width="6" height="6" fill="#7c4dff"/>
      <rect x="66" y="30" width="6" height="6" fill="#7c4dff"/>

      <!-- Row 7 - handle bottoms -->
      <rect x="6" y="36" width="6" height="6" fill="#00b8d4"/>
      <rect x="12" y="36" width="6" height="6" fill="#00b8d4"/>
      <rect x="18" y="36" width="6" height="6" fill="#00b8d4"/>
      <rect x="48" y="36" width="6" height="6" fill="#7c4dff"/>
      <rect x="54" y="36" width="6" height="6" fill="#7c4dff"/>
      <rect x="60" y="36" width="6" height="6" fill="#7c4dff"/>
    </g>

    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" class="s-pixel" font-size="7" fill="#00e676" letter-spacing="1">GAME ON</text>
  </g>

  <!-- ==================== STICKER 4: VR Experience Logo Badge ==================== -->
  <g transform="translate(330, 355)">
    <!-- Sticker background - shield/badge shape -->
    <rect x="-65" y="-85" width="130" height="170" rx="10" fill="#0a0a1a"/>
    <rect x="-63" y="-83" width="126" height="166" rx="9" fill="none" stroke="url(#sGrad)" stroke-width="1.5"/>

    <!-- Badge inner shape -->
    <path d="M0,-60 L45,-45 L45,10 L0,50 L-45,10 L-45,-45 Z" fill="#0d0d2b" stroke="url(#sGrad)" stroke-width="1.5"/>

    <!-- Inner accent line -->
    <path d="M0,-48 L35,-36 L35,5 L0,38 L-35,5 L-35,-36 Z" fill="none" stroke="url(#sGrad)" stroke-width="0.5" opacity="0.4"/>

    <!-- VR text -->
    <g filter="url(#sGlow)">
      <text x="0" y="-10" text-anchor="middle" class="s-title" font-size="28" fill="url(#sGrad)" letter-spacing="2">VR</text>
    </g>
    <text x="0" y="-10" text-anchor="middle" class="s-title" font-size="28" fill="url(#sGrad)" letter-spacing="2">VR</text>

    <!-- EXPERIENCE text -->
    <text x="0" y="12" text-anchor="middle" class="s-sub" font-size="7" fill="#ffffff" letter-spacing="4">EXPERIENCE</text>

    <!-- SSA badge -->
    <text x="0" y="30" text-anchor="middle" class="s-light" font-size="6" fill="#00b8d4" letter-spacing="2" opacity="0.6">SALVADOR</text>

    <!-- Accent dots -->
    <circle cx="-15" cy="20" r="1.5" fill="#00b8d4" opacity="0.4"/>
    <circle cx="15" cy="20" r="1.5" fill="#7c4dff" opacity="0.4"/>

    <!-- OFFICIAL label -->
    <text x="0" y="72" text-anchor="middle" class="s-light" font-size="6" fill="#ffffff" letter-spacing="2" opacity="0.3">OFFICIAL</text>
  </g>

  <!-- ==================== STICKER 5: JOGADOR VR Badge ==================== -->
  <g transform="translate(500, 355)">
    <!-- Sticker background -->
    <rect x="-65" y="-85" width="130" height="170" rx="10" fill="#0a0a1a"/>
    <rect x="-63" y="-83" width="126" height="166" rx="9" fill="none" stroke="#00e676" stroke-width="1.5"/>

    <!-- Green accent top band -->
    <rect x="-55" y="-70" width="110" height="25" rx="4" fill="#00e676" opacity="0.15"/>

    <!-- JOGADOR text -->
    <text x="0" y="-52" text-anchor="middle" class="s-title" font-size="16" fill="#00e676" letter-spacing="3">JOGADOR</text>

    <!-- VR big text -->
    <g filter="url(#sGlow)">
      <text x="0" y="5" text-anchor="middle" class="s-title" font-size="48" fill="url(#sGrad)" letter-spacing="4">VR</text>
    </g>
    <text x="0" y="5" text-anchor="middle" class="s-title" font-size="48" fill="url(#sGrad)" letter-spacing="4">VR</text>

    <!-- Stars/rank indicators -->
    <g transform="translate(0, 30)">
      <!-- 5 stars -->
      <g fill="#FFD700" opacity="0.7">
        <polygon points="-32,0 -30,-5 -28,0 -33,3 -27,3" transform="scale(1.3)"/>
        <polygon points="-16,0 -14,-5 -12,0 -17,3 -11,3" transform="scale(1.3)"/>
        <polygon points="0,0 2,-5 4,0 -1,3 5,3" transform="scale(1.3)"/>
        <polygon points="16,0 18,-5 20,0 15,3 21,3" transform="scale(1.3)"/>
        <polygon points="32,0 34,-5 36,0 31,3 37,3" transform="scale(1.3)"/>
      </g>
    </g>

    <!-- Divider -->
    <line x1="-40" y1="50" x2="40" y2="50" stroke="#00e676" stroke-width="0.8" opacity="0.3"/>

    <!-- PRO GAMER subtitle -->
    <text x="0" y="65" text-anchor="middle" class="s-sub" font-size="7" fill="#00e676" letter-spacing="4" opacity="0.6">PRO GAMER</text>
  </g>

  <!-- Sheet title at very top -->
  <text x="300" y="20" text-anchor="middle" class="s-light" font-size="8" fill="#999999" letter-spacing="2">VR EXPERIENCE - STICKER SHEET</text>
</svg>