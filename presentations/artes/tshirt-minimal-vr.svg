<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500&amp;display=swap');
      .min-title { font-family: 'Orbitron', sans-serif; font-weight: 500; }
      .min-sub { font-family: 'Orbitron', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#0a0a1a" rx="8"/>

  <!-- Minimal VR Headset Outline - centered -->
  <g transform="translate(200, 210)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

    <!-- Main headset body outline -->
    <path d="M-85,0 C-85,-42 -68,-58 0,-58 C68,-58 85,-42 85,0 C85,28 68,46 0,46 C-68,46 -85,28 -85,0 Z"/>

    <!-- Left lens -->
    <ellipse cx="-30" cy="-2" rx="26" ry="22"/>

    <!-- Right lens -->
    <ellipse cx="30" cy="-2" rx="26" ry="22"/>

    <!-- Nose bridge -->
    <path d="M-4,15 Q0,22 4,15"/>

    <!-- Head strap left -->
    <path d="M-85,-5 Q-105,-5 -108,5 Q-105,15 -85,15" stroke-width="1.2"/>

    <!-- Head strap right -->
    <path d="M85,-5 Q105,-5 108,5 Q105,15 85,15" stroke-width="1.2"/>

    <!-- Top strap -->
    <path d="M-30,-58 Q0,-75 30,-58" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Subtle brand accent - single thin line -->
  <line x1="160" y1="290" x2="240" y2="290" stroke="#00b8d4" stroke-width="0.8" opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="330" text-anchor="middle" class="min-title" font-size="13" fill="#ffffff" letter-spacing="10" opacity="0.9">VR EXPERIENCE</text>

  <!-- Subtle tagline -->
  <text x="200" y="355" text-anchor="middle" class="min-sub" font-size="7" fill="#ffffff" letter-spacing="5" opacity="0.3">SALVADOR - BAHIA</text>
</svg>