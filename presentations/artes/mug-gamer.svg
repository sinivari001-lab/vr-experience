<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" width="1120" height="400">
  <defs>
    <linearGradient id="gamerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="40%" stop-color="#00b8d4"/>
      <stop offset="70%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>
    <linearGradient id="gamerGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="gGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      .gamer-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .gamer-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1120" height="400" fill="#0a0a1a"/>

  <!-- Neon line top -->
  <rect x="0" y="0" width="1120" height="2" fill="url(#gamerGrad)" opacity="0.8"/>
  <rect x="0" y="398" width="1120" height="2" fill="url(#gamerGrad)" opacity="0.8"/>

  <!-- Background neon grid -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="1120" y2="50" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1120" y2="100" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1120" y2="150" stroke="#7c4dff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1120" y2="200" stroke="#7c4dff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="1120" y2="250" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1120" y2="300" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="1120" y2="350" stroke="#7c4dff" stroke-width="0.5"/>
  </g>

  <!-- LEFT SECTION: Game controller icon -->
  <g transform="translate(160, 200)">
    <g filter="url(#gSoft)">
      <!-- Controller body -->
      <path d="M-60,-15 C-60,-30 -40,-35 -20,-35 L20,-35 C40,-35 60,-30 60,-15 L60,5 C60,15 50,25 35,35 L25,42 C20,45 15,45 10,40 L5,35 L-5,35 L-10,40 C-15,45 -20,45 -25,42 L-35,35 C-50,25 -60,15 -60,5 Z"
            fill="none" stroke="#00e676" stroke-width="2"/>
    </g>

    <!-- D-pad -->
    <rect x="-35" y="-10" width="8" height="20" rx="1" fill="#00e676" opacity="0.4"/>
    <rect x="-41" y="-4" width="20" height="8" rx="1" fill="#00e676" opacity="0.4"/>

    <!-- Action buttons -->
    <circle cx="30" cy="-12" r="5" fill="none" stroke="#00b8d4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="40" cy="-2" r="5" fill="none" stroke="#ff4081" stroke-width="1.5" opacity="0.6"/>
    <circle cx="20" cy="-2" r="5" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="30" cy="8" r="5" fill="none" stroke="#00e676" stroke-width="1.5" opacity="0.6"/>

    <!-- Analog sticks -->
    <circle cx="-18" cy="12" r="7" fill="none" stroke="#00b8d4" stroke-width="1" opacity="0.4"/>
    <circle cx="8" cy="12" r="7" fill="none" stroke="#7c4dff" stroke-width="1" opacity="0.4"/>

    <!-- Center buttons -->
    <rect x="-6" y="-18" width="12" height="5" rx="2" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- CENTER: VR Headset with neon effects -->
  <g transform="translate(460, 175)">
    <!-- Glow background -->
    <ellipse cx="0" cy="10" rx="90" ry="55" fill="url(#gamerGrad2)" opacity="0.05"/>

    <!-- Headset -->
    <g filter="url(#gGlow)">
      <path d="M-75,0 C-75,-38 -60,-52 0,-52 C60,-52 75,-38 75,0 C75,24 60,42 0,42 C-60,42 -75,24 -75,0 Z"
            fill="none" stroke="#00b8d4" stroke-width="2.5"/>
    </g>
    <path d="M-75,0 C-75,-38 -60,-52 0,-52 C60,-52 75,-38 75,0 C75,24 60,42 0,42 C-60,42 -75,24 -75,0 Z"
          fill="#0d0d2b" stroke="url(#gamerGrad2)" stroke-width="2"/>

    <!-- Left lens -->
    <g filter="url(#gSoft)">
      <ellipse cx="-26" cy="-2" rx="24" ry="20" fill="none" stroke="#00b8d4" stroke-width="2.5"/>
    </g>
    <ellipse cx="-26" cy="-2" rx="18" ry="14" fill="#00b8d4" opacity="0.08"/>

    <!-- Right lens -->
    <g filter="url(#gSoft)">
      <ellipse cx="26" cy="-2" rx="24" ry="20" fill="none" stroke="#7c4dff" stroke-width="2.5"/>
    </g>
    <ellipse cx="26" cy="-2" rx="18" ry="14" fill="#7c4dff" opacity="0.08"/>

    <!-- Straps -->
    <path d="M-75,-5 Q-95,-5 -98,4 Q-95,13 -75,13" fill="none" stroke="#00b8d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M75,-5 Q95,-5 98,4 Q95,13 75,13" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Text: VR EXPERIENCE -->
  <g filter="url(#gGlow)">
    <text x="560" y="290" text-anchor="middle" class="gamer-title" font-size="52" fill="#ffffff" letter-spacing="5">VR</text>
  </g>
  <text x="560" y="290" text-anchor="middle" class="gamer-title" font-size="52" fill="#ffffff" letter-spacing="5">VR</text>
  <text x="560" y="325" text-anchor="middle" class="gamer-sub" font-size="24" fill="url(#gamerGrad)" letter-spacing="8">EXPERIENCE</text>

  <!-- Neon underline -->
  <g filter="url(#gSoft)">
    <line x1="430" y1="340" x2="690" y2="340" stroke="url(#gamerGrad)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- GAMER text -->
  <text x="560" y="365" text-anchor="middle" class="gamer-sub" font-size="10" fill="#00e676" letter-spacing="6" opacity="0.5">GAMER EDITION</text>

  <!-- RIGHT SECTION: Gaming icons scattered -->
  <g transform="translate(870, 200)">
    <!-- Pixel sword -->
    <g transform="translate(-60, -80) rotate(45, -60, -80)" opacity="0.3">
      <rect x="0" y="0" width="4" height="30" fill="#00b8d4"/>
      <rect x="-4" y="26" width="12" height="4" fill="#7c4dff"/>
      <rect x="-2" y="30" width="8" height="10" fill="#00e676"/>
    </g>

    <!-- Pixel shield -->
    <g transform="translate(40, -70)" opacity="0.25">
      <path d="M0,-20 L15,-10 L15,8 L0,20 L-15,8 L-15,-10 Z" fill="none" stroke="#7c4dff" stroke-width="2"/>
      <path d="M0,-12 L0,12" stroke="#00b8d4" stroke-width="1.5"/>
      <path d="M-8,0 L8,0" stroke="#00b8d4" stroke-width="1.5"/>
    </g>

    <!-- Health bar -->
    <g transform="translate(-40, 50)" opacity="0.3">
      <rect x="0" y="0" width="80" height="10" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
      <rect x="1" y="1" width="55" height="8" rx="1.5" fill="#00e676"/>
      <text x="40" y="8" text-anchor="middle" font-size="6" fill="#ffffff" font-family="monospace">HP</text>
    </g>

    <!-- XP bar -->
    <g transform="translate(-40, 70)" opacity="0.25">
      <rect x="0" y="0" width="80" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="0.8"/>
      <rect x="1" y="1" width="35" height="6" rx="1.5" fill="#7c4dff"/>
      <text x="40" y="7" text-anchor="middle" font-size="5" fill="#ffffff" font-family="monospace">XP</text>
    </g>

    <!-- Floating stars -->
    <g filter="url(#gSoft)">
      <polygon points="0,-50 3,-42 10,-42 4,-37 6,-30 0,-34 -6,-30 -4,-37 -10,-42 -3,-42" fill="#FFD700" opacity="0.3"/>
      <polygon points="60,20 62,25 68,25 63,28 65,33 60,30 55,33 57,28 52,25 58,25" fill="#FFD700" opacity="0.2"/>
      <polygon points="-70,30 -68,34 -63,34 -67,37 -65,42 -70,39 -75,42 -73,37 -77,34 -72,34" fill="#FFD700" opacity="0.25"/>
    </g>

    <!-- Power-up icon -->
    <g transform="translate(70, -30)" opacity="0.3">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#ff4081" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="#ff4081" font-family="monospace" font-weight="bold">!</text>
    </g>
  </g>

  <!-- Scattered neon particles across entire mug -->
  <g opacity="0.2">
    <circle cx="80" cy="60" r="2" fill="#00b8d4" filter="url(#gSoft)"/>
    <circle cx="1040" cy="80" r="2.5" fill="#7c4dff" filter="url(#gSoft)"/>
    <circle cx="300" cy="350" r="1.5" fill="#00e676" filter="url(#gSoft)"/>
    <circle cx="800" cy="340" r="2" fill="#ff4081" filter="url(#gSoft)"/>
    <circle cx="100" cy="300" r="1.8" fill="#7c4dff"/>
    <circle cx="1000" cy="300" r="1.5" fill="#00b8d4"/>
    <circle cx="350" cy="50" r="1.2" fill="#00e676"/>
    <circle cx="750" cy="60" r="1.5" fill="#ff4081"/>
  </g>
</svg>