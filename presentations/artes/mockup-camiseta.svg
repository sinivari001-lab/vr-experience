<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <linearGradient id="shirtShade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="foldL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="foldR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="nGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="shirtClip">
      <path d="M300,68 L370,55 L430,30 L480,65 L500,95 L460,135 L420,120 L410,155 L410,620 Q410,640 390,640 L210,640 Q190,640 190,620 L190,155 L180,120 L140,135 L100,95 L120,65 L170,30 L230,55 Z"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      .t-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .t-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- T-shirt body -->
  <g filter="url(#shadow)">
    <!-- Left sleeve -->
    <path d="M230,55 L170,30 L120,65 L100,95 L140,135 L180,120 L190,155 L190,100 Z"
          fill="url(#shirtShade)" stroke="#222" stroke-width="1"/>
    <!-- Right sleeve -->
    <path d="M370,55 L430,30 L480,65 L500,95 L460,135 L420,120 L410,155 L410,100 Z"
          fill="url(#shirtShade)" stroke="#222" stroke-width="1"/>
    <!-- Main body -->
    <path d="M190,100 L190,620 Q190,640 210,640 L390,640 Q410,640 410,620 L410,100 Z"
          fill="url(#shirtShade)" stroke="#222" stroke-width="1"/>
    <!-- Collar -->
    <path d="M230,55 L265,72 Q300,82 335,72 L370,55 Q350,48 300,68 Q250,48 230,55 Z"
          fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  </g>

  <!-- Fabric fold highlights -->
  <g clip-path="url(#shirtClip)" opacity="0.4">
    <rect x="190" y="100" width="110" height="540" fill="url(#foldL)"/>
    <rect x="300" y="100" width="110" height="540" fill="url(#foldR)"/>
    <!-- Subtle wrinkle lines -->
    <line x1="240" y1="200" x2="250" y2="400" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    <line x1="350" y1="220" x2="340" y2="420" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    <line x1="280" y1="450" x2="290" y2="600" stroke="#ffffff" stroke-width="0.2" opacity="0.05"/>
  </g>

  <!-- ==================== DESIGN ON SHIRT ==================== -->
  <g clip-path="url(#shirtClip)">
    <!-- Ambient glow behind headset -->
    <ellipse cx="300" cy="290" rx="100" ry="65" fill="url(#nGrad)" opacity="0.06"/>

    <!-- VR Headset -->
    <g transform="translate(300, 280)">
      <!-- Outer glow -->
      <g filter="url(#nGlow)" opacity="0.35">
        <path d="M-75,0 C-75,-40 -60,-54 0,-54 C60,-54 75,-40 75,0 C75,25 60,43 0,43 C-60,43 -75,25 -75,0 Z"
              fill="none" stroke="url(#nGrad)" stroke-width="1.5"/>
      </g>
      <!-- Headset body -->
      <path d="M-75,0 C-75,-40 -60,-54 0,-54 C60,-54 75,-40 75,0 C75,25 60,43 0,43 C-60,43 -75,25 -75,0 Z"
            fill="#0d0d2b" stroke="url(#nGrad)" stroke-width="1.8" opacity="0.9"/>
      <!-- Front panel -->
      <path d="M-64,-4 C-64,-32 -52,-43 0,-43 C52,-43 64,-32 64,-4 C64,18 52,32 0,32 C-52,32 -64,18 -64,-4 Z"
            fill="#0a0a1a" stroke="url(#nGrad)" stroke-width="0.7" opacity="0.5"/>

      <!-- Left lens -->
      <g filter="url(#nGlow)">
        <ellipse cx="-27" cy="-4" rx="23" ry="20" fill="none" stroke="#00b8d4" stroke-width="1.8"/>
      </g>
      <ellipse cx="-27" cy="-4" rx="18" ry="15" fill="#00b8d4" opacity="0.05"/>
      <ellipse cx="-31" cy="-9" rx="6" ry="4" fill="#00b8d4" opacity="0.12" transform="rotate(-15,-31,-9)"/>

      <!-- Right lens -->
      <g filter="url(#nGlow)">
        <ellipse cx="27" cy="-4" rx="23" ry="20" fill="none" stroke="#7c4dff" stroke-width="1.8"/>
      </g>
      <ellipse cx="27" cy="-4" rx="18" ry="15" fill="#7c4dff" opacity="0.05"/>
      <ellipse cx="23" cy="-9" rx="6" ry="4" fill="#7c4dff" opacity="0.12" transform="rotate(15,23,-9)"/>

      <!-- Nose bridge -->
      <path d="M-4,14 Q0,22 4,14" fill="none" stroke="url(#nGrad)" stroke-width="1" opacity="0.4"/>

      <!-- Head strap left -->
      <g filter="url(#nSoft)">
        <path d="M-75,-7 Q-93,-7 -96,4 Q-93,15 -75,15" fill="none" stroke="#00b8d4" stroke-width="1.4" opacity="0.6"/>
      </g>
      <!-- Head strap right -->
      <g filter="url(#nSoft)">
        <path d="M75,-7 Q93,-7 96,4 Q93,15 75,15" fill="none" stroke="#7c4dff" stroke-width="1.4" opacity="0.6"/>
      </g>

      <!-- Decorative lines -->
      <line x1="-61" y1="-25" x2="-43" y2="-25" stroke="#00b8d4" stroke-width="0.7" opacity="0.5"/>
      <line x1="61" y1="-25" x2="43" y2="-25" stroke="#7c4dff" stroke-width="0.7" opacity="0.5"/>
    </g>

    <!-- Neon flow lines -->
    <g filter="url(#nSoft)" opacity="0.5">
      <path d="M220,345 Q260,358 300,350 Q340,342 380,355" fill="none" stroke="#00b8d4" stroke-width="1.2"/>
      <path d="M210,358 Q260,370 300,363 Q340,356 390,368" fill="none" stroke="#7c4dff" stroke-width="0.8"/>
    </g>

    <!-- Floating particles -->
    <g opacity="0.4">
      <circle cx="230" cy="240" r="1.5" fill="#00b8d4" filter="url(#nSoft)"/>
      <circle cx="370" cy="255" r="1.2" fill="#7c4dff" filter="url(#nSoft)"/>
      <circle cx="245" cy="340" r="1.3" fill="#00b8d4" filter="url(#nSoft)"/>
      <circle cx="355" cy="330" r="1.6" fill="#7c4dff" filter="url(#nSoft)"/>
      <circle cx="280" cy="230" r="0.9" fill="#00e676" filter="url(#nSoft)"/>
      <circle cx="320" cy="235" r="0.7" fill="#00e676" filter="url(#nSoft)"/>
    </g>

    <!-- Title: VR -->
    <g filter="url(#nGlow)">
      <text x="300" y="415" text-anchor="middle" class="t-title" font-size="30" fill="url(#nGrad)" letter-spacing="3">VR</text>
    </g>
    <text x="300" y="415" text-anchor="middle" class="t-title" font-size="30" fill="url(#nGrad)" letter-spacing="3">VR</text>

    <!-- EXPERIENCE -->
    <g filter="url(#nSoft)">
      <text x="300" y="442" text-anchor="middle" class="t-sub" font-size="16" fill="#ffffff" letter-spacing="6" opacity="0.9">EXPERIENCE</text>
    </g>
    <text x="300" y="442" text-anchor="middle" class="t-sub" font-size="16" fill="#ffffff" letter-spacing="6" opacity="0.9">EXPERIENCE</text>

    <!-- Underline -->
    <g filter="url(#nSoft)">
      <line x1="230" y1="455" x2="370" y2="455" stroke="url(#nGrad)" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Tagline -->
    <text x="300" y="475" text-anchor="middle" class="t-sub" font-size="7" fill="#00b8d4" letter-spacing="4" opacity="0.5">REALIDADE VIRTUAL</text>

    <!-- Accent dots -->
    <circle cx="275" cy="492" r="1.5" fill="#00b8d4" opacity="0.35"/>
    <circle cx="300" cy="492" r="1.5" fill="#7c4dff" opacity="0.35"/>
    <circle cx="325" cy="492" r="1.5" fill="#00e676" opacity="0.35"/>
  </g>
</svg>