<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" width="1120" height="400">
  <!-- Mug wrap-around: ~280mm x 100mm at 4x for print quality = 1120x400 -->
  <defs>
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="mugGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mugSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;display=swap');
      .mug-title { font-family: 'Orbitron', sans-serif; font-weight: 900; }
      .mug-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; }
      .mug-tag { font-family: 'Orbitron', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1120" height="400" fill="#0a0a1a"/>

  <!-- Subtle gradient stripe at top and bottom -->
  <rect x="0" y="0" width="1120" height="3" fill="url(#mugGrad)" opacity="0.6"/>
  <rect x="0" y="397" width="1120" height="3" fill="url(#mugGrad)" opacity="0.6"/>

  <!-- Left section: VR Headset Icon -->
  <g transform="translate(200, 200)">
    <!-- Headset outline -->
    <g filter="url(#mugGlow)">
      <path d="M-70,0 C-70,-35 -56,-48 0,-48 C56,-48 70,-35 70,0 C70,22 56,38 0,38 C-56,38 -70,22 -70,0 Z"
            fill="none" stroke="url(#mugGrad)" stroke-width="2.5"/>
    </g>
    <path d="M-70,0 C-70,-35 -56,-48 0,-48 C56,-48 70,-35 70,0 C70,22 56,38 0,38 C-56,38 -70,22 -70,0 Z"
          fill="#0d0d2b" stroke="url(#mugGrad)" stroke-width="2"/>

    <!-- Left lens -->
    <g filter="url(#mugSoft)">
      <ellipse cx="-24" cy="-2" rx="22" ry="18" fill="none" stroke="#00b8d4" stroke-width="2"/>
    </g>
    <ellipse cx="-24" cy="-2" rx="16" ry="13" fill="#00b8d4" opacity="0.06"/>

    <!-- Right lens -->
    <g filter="url(#mugSoft)">
      <ellipse cx="24" cy="-2" rx="22" ry="18" fill="none" stroke="#7c4dff" stroke-width="2"/>
    </g>
    <ellipse cx="24" cy="-2" rx="16" ry="13" fill="#7c4dff" opacity="0.06"/>

    <!-- Nose bridge -->
    <path d="M-3,12 Q0,18 3,12" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

    <!-- Straps -->
    <path d="M-70,-5 Q-88,-5 -90,4 Q-88,13 -70,13" fill="none" stroke="#00b8d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M70,-5 Q88,-5 90,4 Q88,13 70,13" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Divider line -->
  <line x1="350" y1="80" x2="350" y2="320" stroke="url(#mugGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Center: Brand name -->
  <g filter="url(#mugGlow)">
    <text x="560" y="170" text-anchor="middle" class="mug-title" font-size="64" fill="url(#mugGrad)" letter-spacing="6">VR</text>
  </g>
  <text x="560" y="170" text-anchor="middle" class="mug-title" font-size="64" fill="url(#mugGrad)" letter-spacing="6">VR</text>

  <text x="560" y="220" text-anchor="middle" class="mug-sub" font-size="32" fill="#ffffff" letter-spacing="12" opacity="0.95">EXPERIENCE</text>

  <!-- Accent line -->
  <line x1="420" y1="245" x2="700" y2="245" stroke="url(#mugGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="560" y="275" text-anchor="middle" class="mug-tag" font-size="16" fill="#00b8d4" letter-spacing="4" opacity="0.7">REALIDADE VIRTUAL EM SALVADOR</text>

  <!-- Right section: decorative elements -->
  <g transform="translate(900, 200)">
    <!-- Floating particles -->
    <circle cx="-40" cy="-60" r="3" fill="#00b8d4" opacity="0.3" filter="url(#mugSoft)"/>
    <circle cx="40" cy="-40" r="2" fill="#7c4dff" opacity="0.3" filter="url(#mugSoft)"/>
    <circle cx="-30" cy="50" r="2.5" fill="#00e676" opacity="0.25" filter="url(#mugSoft)"/>
    <circle cx="50" cy="30" r="2" fill="#00b8d4" opacity="0.2" filter="url(#mugSoft)"/>
    <circle cx="0" cy="-80" r="1.5" fill="#7c4dff" opacity="0.2"/>
    <circle cx="60" cy="-70" r="2" fill="#00b8d4" opacity="0.15"/>
    <circle cx="-60" cy="0" r="1.8" fill="#00e676" opacity="0.2"/>
    <circle cx="30" cy="70" r="2" fill="#7c4dff" opacity="0.15"/>

    <!-- Abstract VR waves -->
    <path d="M-80,0 Q-40,-30 0,0 Q40,30 80,0" fill="none" stroke="#00b8d4" stroke-width="1" opacity="0.2"/>
    <path d="M-80,10 Q-40,-20 0,10 Q40,40 80,10" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0.15"/>
  </g>

  <!-- Small brand dots at bottom center -->
  <circle cx="540" cy="340" r="3" fill="#00b8d4" opacity="0.4"/>
  <circle cx="560" cy="340" r="3" fill="#7c4dff" opacity="0.4"/>
  <circle cx="580" cy="340" r="3" fill="#00e676" opacity="0.4"/>
</svg>