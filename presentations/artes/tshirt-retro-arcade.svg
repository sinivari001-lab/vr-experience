    <!-- Row 7 - bottom body -->
    <rect x="24" y="48" width="8" height="8" fill="#00b8d4"/>
    <rect x="32" y="48" width="8" height="8" fill="#0d1b2a"/>
    <rect x="40" y="48" width="8" height="8" fill="#0d1b2a"/>
