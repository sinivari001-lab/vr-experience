    <!-- Row 1 - top of headset (pixels 4-19 of a 24-wide grid) -->
    <rect x="32" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="40" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="48" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="56" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="64" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="72" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="80" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="88" y="0" width="8" height="8" fill="#00b8d4"/>
    <rect x="96" y="0" width="8" height="8" fill="#ff4081"/>
