    <rect x="112" y="0" width="8" height="8" fill="#ff4081"/>
    <rect x="120" y="0" width="8" height="8" fill="#ff4081"/>
    <rect x="128" y="0" width="8" height="8" fill="#ff4081"/>
    <rect x="136" y="0" width="8" height="8" fill="#ff4081"/>
    <rect x="144" y="0" width="8" height="8" fill="#ff4081"/>
    <rect x="152" y="0" width="8" height="8" fill="#ff4081"/>

    <!-- Row 2 -->
    <rect x="24" y="8" width="8" height="8" fill="#00b8d4"/>
    <rect x="32" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="40" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="48" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="56" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="64" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="72" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="80" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="88" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="96" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="104" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="112" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="120" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="128" y="8" width="8" height="8" fill="#0d1b2a"/>
    <rect x="136" y="8" width="8" height="8" fill="#0d1b2a"/>
