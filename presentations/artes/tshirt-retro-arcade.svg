<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
      .pixel-font { font-family: 'Press Start 2P', monospace; }
      .title-font { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    </style>
    <filter id="retroGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#0a0a1a" rx="8"/>

  <!-- Grid background (retro style) -->
  <g opacity="0.08">
    <!-- Vertical grid lines -->
    <line x1="40" y1="0" x2="40" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="280" y1="0" x2="280" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="500" stroke="#ff4081" stroke-width="0.5"/>
    <!-- Horizontal grid lines -->
    <line x1="0" y1="40" x2="400" y2="40" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="400" y2="80" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="400" y2="120" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="400" y2="280" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="400" y2="360" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="400" y2="400" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="440" x2="400" y2="440" stroke="#00b8d4" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="400" y2="480" stroke="#00b8d4" stroke-width="0.5"/>
  </g>

  <!-- Pixel Art VR Headset (built from 8x8 pixel blocks) -->
  <g transform="translate(104, 80)">
