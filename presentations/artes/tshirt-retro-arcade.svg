    <rect x="144" y="32" width="8" height="8" fill="#0d1b2a"/>
    <rect x="152" y="32" width="8" height="8" fill="#0d1b2a"/>
    <rect x="160" y="32" width="8" height="8" fill="#ff4081"/>

    <!-- Row 6 - bottom lenses -->
    <rect x="24" y="40" width="8" height="8" fill="#0d1b2a"/>
    <rect x="32" y="40" width="8" height="8" fill="#0d1b2a"/>
    <rect x="40" y="40" width="8" height="8" fill="#00b8d4"/>
    <rect x="48" y="40" width="8" height="8" fill="#00b8d4"/>
    <rect x="56" y="40" width="8" height="8" fill="#00b8d4"/>
    <rect x="64" y="40" width="8" height="8" fill="#00b8d4"/>
    <rect x="72" y="40" width="8" height="8" fill="#00b8d4"/>
    <rect x="80" y="40" width="8" height="8" fill="#0d1b2a"/>
