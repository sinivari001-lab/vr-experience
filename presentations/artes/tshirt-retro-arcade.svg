  <!-- Score display -->
  <text x="200" y="210" text-anchor="middle" class="pixel-font" font-size="10" fill="#FFD700" filter="url(#retroGlow)">HI-SCORE: 999999</text>

  <!-- "INSERT COIN" blinking text effect -->
