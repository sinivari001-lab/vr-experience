    <rect x="16" y="24" width="8" height="8" fill="#00b8d4"/>
    <rect x="24" y="24" width="8" height="8" fill="#0d1b2a"/>
    <rect x="32" y="24" width="8" height="8" fill="#0d1b2a"/>
    <rect x="40" y="24" width="8" height="8" fill="#00b8d4"/>
    <rect x="48" y="24" width="8" height="8" fill="#00e5ff"/>
    <rect x="56" y="24" width="8" height="8" fill="#00e5ff"/>
    <rect x="64" y="24" width="8" height="8" fill="#00e5ff"/>
    <rect x="72" y="24" width="8" height="8" fill="#00b8d4"/>
