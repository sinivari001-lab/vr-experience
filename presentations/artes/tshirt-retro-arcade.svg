  </g>

  <!-- Pixel coin (bottom left) -->
  <g transform="translate(50, 280)">
    <rect x="8" y="0" width="8" height="8" fill="#FFD700"/>
    <rect x="16" y="0" width="8" height="8" fill="#FFD700"/>
    <rect x="0" y="8" width="8" height="8" fill="#FFD700"/>
    <rect x="8" y="8" width="8" height="8" fill="#FFF176"/>
    <rect x="16" y="8" width="8" height="8" fill="#FFD700"/>
    <rect x="24" y="8" width="8" height="8" fill="#FFD700"/>
