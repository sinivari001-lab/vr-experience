<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="neonGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099aa"/>
      <stop offset="50%" stop-color="#6d3fc4"/>
      <stop offset="100%" stop-color="#cc00cc"/>
    </linearGradient>
    <linearGradient id="iconGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099aa"/>
      <stop offset="100%" stop-color="#cc00cc"/>
    </linearGradient>
  </defs>

  <!-- VR Headset Icon (darker tones for light backgrounds) -->
  <g transform="translate(12,18)">
    <rect x="4" y="8" width="76" height="48" rx="16" ry="16"
          stroke="url(#iconGradL)" stroke-width="3" fill="none"/>
    <circle cx="28" cy="32" r="14" stroke="#0099aa" stroke-width="2.5" fill="none"/>
    <circle cx="56" cy="32" r="14" stroke="#cc00cc" stroke-width="2.5" fill="none"/>
    <path d="M38,32 C39.5,25 44.5,25 46,32" stroke="#6d3fc4" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M4,22 L-4,18" stroke="#0099aa" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <path d="M4,42 L-4,46" stroke="#0099aa" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <path d="M80,22 L88,18" stroke="#cc00cc" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <path d="M80,42 L88,46" stroke="#cc00cc" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <circle cx="21" cy="26" r="2.5" fill="#0099aa" opacity="0.5"/>
    <circle cx="49" cy="26" r="2.5" fill="#cc00cc" opacity="0.5"/>
  </g>

  <!-- "VR" text -->
  <text x="118" y="62" font-family="'Orbitron',sans-serif" font-weight="800" font-size="48"
        fill="url(#neonGradL)" letter-spacing="4">VR</text>

  <!-- "EXPERIENCE" text (dark for light backgrounds) -->
  <text x="118" y="92" font-family="'Orbitron',sans-serif" font-weight="400" font-size="22"
        fill="#1a1a2e" letter-spacing="8" opacity="0.92">EXPERIENCE</text>

  <!-- Decorative line -->
  <line x1="118" y1="100" x2="350" y2="100" stroke="url(#neonGradL)" stroke-width="1" opacity="0.35"/>
</svg>
