<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
  </defs>
  <!-- Headset body -->
  <rect x="6" y="16" width="52" height="32" rx="12" ry="12"
        stroke="url(#fg)" stroke-width="3" fill="none"/>
  <!-- Left lens -->
  <circle cx="24" cy="32" r="10" stroke="#00e5ff" stroke-width="2.5" fill="none"/>
  <!-- Right lens -->
  <circle cx="40" cy="32" r="10" stroke="#ff00ff" stroke-width="2.5" fill="none"/>
  <!-- Bridge -->
  <path d="M31,32 C31.8,28 32.2,28 33,32" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Straps -->
  <line x1="6" y1="25" x2="2" y2="22" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="39" x2="2" y2="42" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="58" y1="25" x2="62" y2="22" stroke="#ff00ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="58" y1="39" x2="62" y2="42" stroke="#ff00ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Reflections -->
  <circle cx="19" cy="28" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="35" cy="28" r="2" fill="#ff00ff" opacity="0.5"/>
</svg>
