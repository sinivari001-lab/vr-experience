<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- VR Headset Icon -->
  <g transform="translate(12,18)" filter="url(#glowCyan)">
    <!-- Headset body -->
    <rect x="4" y="8" width="76" height="48" rx="16" ry="16"
          stroke="url(#iconGrad)" stroke-width="3" fill="none"/>
    <!-- Left lens -->
    <circle cx="28" cy="32" r="14" stroke="#00e5ff" stroke-width="2.5" fill="none"/>
    <!-- Right lens -->
    <circle cx="56" cy="32" r="14" stroke="#ff00ff" stroke-width="2.5" fill="none"/>
    <!-- Bridge -->
    <path d="M38,32 C39.5,25 44.5,25 46,32" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Strap left -->
    <path d="M4,22 L-4,18" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <path d="M4,42 L-4,46" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <!-- Strap right -->
    <path d="M80,22 L88,18" stroke="#ff00ff" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <path d="M80,42 L88,46" stroke="#ff00ff" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <!-- Lens reflections -->
    <circle cx="21" cy="26" r="2.5" fill="#00e5ff" opacity="0.55"/>
    <circle cx="49" cy="26" r="2.5" fill="#ff00ff" opacity="0.55"/>
  </g>

  <!-- "VR" text -->
  <text x="118" y="62" font-family="'Orbitron',sans-serif" font-weight="800" font-size="48"
        fill="url(#neonGrad)" letter-spacing="4" filter="url(#glowText)">VR</text>

  <!-- "EXPERIENCE" text -->
  <text x="118" y="92" font-family="'Orbitron',sans-serif" font-weight="400" font-size="22"
        fill="#ffffff" letter-spacing="8" opacity="0.92">EXPERIENCE</text>

  <!-- Decorative line -->
  <line x1="118" y1="100" x2="350" y2="100" stroke="url(#neonGrad)" stroke-width="1" opacity="0.35"/>
</svg>
