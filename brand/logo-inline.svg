<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 50" fill="none">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <filter id="glw">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mini headset icon -->
  <g transform="translate(2,5)" filter="url(#glw)">
    <rect x="2" y="8" width="36" height="24" rx="8" ry="8"
          stroke="url(#ig)" stroke-width="2" fill="none"/>
    <circle cx="15" cy="20" r="7" stroke="#00e5ff" stroke-width="1.8" fill="none"/>
    <circle cx="25" cy="20" r="7" stroke="#ff00ff" stroke-width="1.8" fill="none"/>
    <path d="M19.5,20 C19.8,17.5 20.2,17.5 20.5,20" stroke="#8b5cf6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Strap hints -->
    <line x1="2" y1="15" x2="-1" y2="13" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="2" y1="25" x2="-1" y2="27" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="38" y1="15" x2="41" y2="13" stroke="#ff00ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="38" y1="25" x2="41" y2="27" stroke="#ff00ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- VR text -->
  <text x="52" y="30" font-family="'Orbitron',sans-serif" font-weight="800" font-size="26"
        fill="url(#ng)" letter-spacing="3" filter="url(#glw)">VR</text>

  <!-- EXPERIENCE text -->
  <text x="106" y="30" font-family="'Orbitron',sans-serif" font-weight="400" font-size="14"
        fill="#ffffff" letter-spacing="5" opacity="0.9">EXPERIENCE</text>
</svg>
