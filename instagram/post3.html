<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @font-face { font-family: 'Orbitron'; font-weight: 700; src: url('../fonts/orbitron-700.ttf') format('truetype'); }
  @font-face { font-family: 'Orbitron'; font-weight: 900; src: url('../fonts/orbitron-900.ttf') format('truetype'); }
  @font-face { font-family: 'Jost'; font-weight: 400; src: url('../fonts/jost-400.ttf') format('truetype'); }
  @font-face { font-family: 'Jost'; font-weight: 600; src: url('../fonts/jost-600.ttf') format('truetype'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #050510;
    font-family: 'Jost', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .photo-grid {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
  }
  .photo-grid img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.35;
  }
  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at center, rgba(5,5,16,0.7) 0%, rgba(5,5,16,0.9) 70%),
      linear-gradient(180deg, rgba(5,5,16,0.3) 0%, rgba(5,5,16,0.95) 100%);
  }
  .content {
    position: relative; z-index: 2;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px;
    text-align: center;
  }
  .emoji-top { font-size: 64px; margin-bottom: 30px; }
  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 56px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 24px;
  }
  .title .magenta { color: #ff00ff; }
  .title .cyan { color: #00e5ff; }
  .desc {
    font-size: 26px;
    color: #b0b8d0;
    line-height: 1.6;
    max-width: 700px;
    margin-bottom: 50px;
  }
  .steps {
    display: flex;
    gap: 32px;
    margin-bottom: 50px;
  }
  .step {
    background: rgba(13,13,37,0.8);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 16px;
    padding: 28px 24px;
    width: 200px;
    text-align: center;
  }
  .step-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(135deg, #00e5ff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .step-icon { font-size: 28px; margin-bottom: 8px; }
  .step-text {
    font-size: 16px;
    color: #b0b8d0;
    line-height: 1.4;
  }
  .whatsapp-btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 22px 48px;
    background: #25d366;
    border-radius: 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(37,211,102,0.4);
  }
  .whatsapp-btn .wa-icon { font-size: 30px; }
  .phone {
    margin-top: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    color: #00e5ff;
    letter-spacing: 3px;
  }
  .logo {
    position: absolute;
    bottom: 40px;
    right: 50px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: #00e5ff;
    opacity: 0.5;
  }
</style></head><body>
  <div class="photo-grid">
    <img src="../img/people-vr-party.jpg">
    <img src="../img/people-vr-kid.jpg">
    <img src="../img/people-vr-family.jpg">
    <img src="../img/people-vr-reaction.jpg">
  </div>
  <div class="overlay"></div>
  <div class="content">
    <div class="emoji-top">🎮🏠</div>
    <h1 class="title">COMO <span class="cyan">AGENDAR</span><br>SUA <span class="magenta">EXPERIÊNCIA</span></h1>
    <p class="desc">Simples, rápido e sem burocracia. A diversão VR chega na sua casa!</p>
    <div class="steps">
      <div class="step">
        <div class="step-num">01</div>
        <div class="step-icon">📱</div>
        <div class="step-text">Chama no<br>WhatsApp</div>
      </div>
      <div class="step">
        <div class="step-num">02</div>
        <div class="step-icon">📅</div>
        <div class="step-text">Escolha data<br>e pacote</div>
      </div>
      <div class="step">
        <div class="step-num">03</div>
        <div class="step-icon">🎉</div>
        <div class="step-text">A gente leva<br>tudo até você!</div>
      </div>
    </div>
    <div class="whatsapp-btn">
      <span class="wa-icon">📲</span> CHAMA NO ZAP
    </div>
    <div class="phone">(71) 99630-5734</div>
  </div>
  <div class="logo">@VREXPERIENCE.SSA</div>
</body></html>
